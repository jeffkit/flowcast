name: CI

# 每次 push 或 PR 跑全量单测。
on:
  push:
    branches: ['**']
    tags-ignore: ['v*']  # tag push 由 publish.yml 处理，不重复跑
  pull_request:

permissions:
  contents: read

jobs:
  test:
    # v0.2.0 macOS realpath / tmpdir 行为需要 macOS runner 覆盖
    # （cf3b415 dirs.js mtime 守护 + git.js realpathSync 兜底）
    timeout-minutes: 30 # 兜底：即使回归出 hang，也 30min 内 fail-fast，不再占满 360min 默认上限
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]
        exclude:
          # 资源节省：macOS × 20 已被 macOS × 22 覆盖；ubuntu 双向矩阵跑
          - os: macos-latest
            node-version: 20
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }} on ${{ matrix.os }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # 安装依赖：v0.6 起 flowcast 依赖 agentproc SDK，测试运行前必须先装。
      # 有 package-lock.json，用 npm ci 做可复现安装。
      - name: Install dependencies
        run: npm ci

      # CI runner 只有 ~2 vCPU，而 test/*.test.js 里多个文件会 spawn
      # 完整导入 flowcast 的重型 node 子进程（orchestrator-cli / subflow 的
      # GOLDEN_SAMPLE dry-run）。默认 --test-concurrency 按核数拉满，会让多个
      # 重型子进程同时抢 CPU → 事件循环饥饿 → 测试 hang / 超时变红。
      # --test-concurrency=1 串行跑文件（文件内测试本就顺序），避免跨文件争抢；
      # --test-timeout 作为兜底，任何真实 hang 都会在 120s 内明确失败而非拖垮整 job。
      - name: Run tests
        run: node --test --test-concurrency=1 --test-timeout=120000 test/*.test.js
