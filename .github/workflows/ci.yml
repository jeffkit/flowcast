name: CI

# 每次 push 或 PR 跑全量单测。
on:
  push:
    branches: ['**']
    tags-ignore: ['v*']  # tag push 由 publish.yml 处理，不重复跑
  pull_request:

permissions:
  contents: read

jobs:
  test:
    # v0.2.0 macOS realpath / tmpdir 行为需要 macOS runner 覆盖
    # （cf3b415 dirs.js mtime 守护 + git.js realpathSync 兜底）
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]
        exclude:
          # 资源节省：macOS × 20 已被 macOS × 22 覆盖；ubuntu 双向矩阵跑
          - os: macos-latest
            node-version: 20
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }} on ${{ matrix.os }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        run: npm test
