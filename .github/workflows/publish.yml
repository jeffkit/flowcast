name: Publish to npm

# 打 tag（v*）即发布到 npm。发布前先跑全量单测，并校验 tag 与 package.json 版本一致。
# 前置（仓库管理员一次性）：在 Settings → Secrets and variables → Actions
# 新增 Secret，名称 NPM_TOKEN，值为 npm Automation Token（见下方说明）。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # npm provenance 需要

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # 发布前跑测试同样需要先装依赖（agentproc SDK）。
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json version: $PKG_VERSION"
          echo "tag version:          $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ tag ($TAG_VERSION) 与 package.json version ($PKG_VERSION) 不一致，请先 npm version 更新版本号再打 tag"
            exit 1
          fi
          echo "✅ 版本一致，继续发布"

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
